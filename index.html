<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Abstracts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'Linotype Didot';
  src: url('fonts/Linotype_Didot_Roman.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #0A0A0A;
  --white: #FFFFFF;
  --gray-50: #FAFAFA;
  --gray-100: #F5F5F5;
  --gray-200: #E5E5E5;
  --gray-300: #D4D4D4;
  --gray-400: #A3A3A3;
  --gray-500: #737373;
  --gray-600: #525252;
  --gray-800: #262626;
  --gray-900: #171717;
  --brand-blue: #129AE5;
  --brand-dark: #09212D;
  --brand-offwhite: #F0F0F0;
  --serif: 'Linotype Didot', 'Didot', Georgia, serif;
  --sans: 'Geist', -apple-system, system-ui, sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --max-w: 1280px;
  --sidebar-w: 240px;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }

body {
  font-family: var(--sans);
  background: var(--white);
  color: var(--black);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ══════════════════════════════════
   SEARCH OVERLAY
   ══════════════════════════════════ */

.search-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 10, 0.6);
  z-index: 1000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12vh;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.search-overlay.active { display: flex; }

.search-box {
  background: var(--white);
  width: 92%;
  max-width: 640px;
  border: 1px solid var(--gray-200);
  overflow: hidden;
  animation: searchIn 0.25s var(--ease);
}

@keyframes searchIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.search-input-wrap {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--gray-200);
  padding: 0 1.25rem;
}

.search-icon {
  color: var(--gray-400);
  font-size: 0.875rem;
  flex-shrink: 0;
  margin-right: 0.75rem;
}

.search-input {
  flex: 1;
  font-family: var(--sans);
  font-size: 0.9375rem;
  font-weight: 300;
  border: none;
  outline: none;
  padding: 1rem 0;
  background: transparent;
  color: var(--black);
}

.search-input::placeholder { color: var(--gray-400); }

.search-hint {
  font-size: 0.6875rem;
  color: var(--gray-400);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}

.search-results {
  max-height: 50vh;
  overflow-y: auto;
}

.search-results::-webkit-scrollbar { width: 4px; }
.search-results::-webkit-scrollbar-track { background: transparent; }
.search-results::-webkit-scrollbar-thumb { background: var(--gray-300); }

.search-result {
  padding: 1rem 1.25rem;
  cursor: pointer;
  border-bottom: 1px solid var(--gray-100);
  transition: background 0.15s;
}

.search-result:last-child { border-bottom: none; }
.search-result:hover { background: var(--gray-50); }

.search-result-doc {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 0.25rem;
}

.search-result-text {
  font-size: 0.8125rem;
  line-height: 1.5;
  color: var(--gray-600);
  font-weight: 300;
}

.search-result-text mark {
  background: transparent;
  color: var(--black);
  font-weight: 500;
}

.search-empty {
  padding: 2rem 1.25rem;
  text-align: center;
  font-size: 0.8125rem;
  color: var(--gray-400);
  font-weight: 300;
}

/* ══════════════════════════════════
   HOME VIEW
   ══════════════════════════════════ */

.home-header {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2.5rem 3rem 0;
  opacity: 0;
  animation: fadeUp 0.7s var(--ease) 0.05s forwards;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home-header-text .lead {
  font-size: 0.9375rem;
  color: var(--gray-500);
  font-weight: 300;
  line-height: 1.55;
}

.home-header-text .lead strong {
  color: var(--black);
  font-weight: 500;
}

.search-trigger {
  font-family: var(--sans);
  font-size: 0.8125rem;
  font-weight: 400;
  color: var(--white);
  background: var(--brand-dark);
  border: 1px solid var(--brand-dark);
  padding: 0.75rem 1.375rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.625rem;
  transition: background 0.25s var(--ease), border-color 0.25s var(--ease);
  letter-spacing: 0.02em;
  white-space: nowrap;
  flex-shrink: 0;
}

.search-trigger:hover { background: var(--brand-blue); border-color: var(--brand-blue); }

.search-trigger kbd {
  font-family: var(--sans);
  font-size: 0.625rem;
  color: var(--gray-400);
  border: 1px solid var(--gray-600);
  padding: 0.15rem 0.4rem;
  border-radius: 2px;
  line-height: 1;
}

#home-view {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 2.5rem 3rem 4rem;
}

/* ── CARD GRID ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--gray-200);
  border: 1px solid var(--gray-200);
}

.card {
  background: var(--white);
  padding: 2.25rem 2.5rem;
  cursor: pointer;
  position: relative;
  transition: background 0.3s var(--ease);
  opacity: 0;
  animation: fadeUp 0.6s var(--ease) forwards;
}

.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.15s; }
.card:nth-child(3) { animation-delay: 0.2s; }
.card:nth-child(4) { animation-delay: 0.25s; }
.card:nth-child(5) { animation-delay: 0.3s; }

.card:hover { background: rgba(18, 154, 229, 0.06); }

.card-number {
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--gray-400);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.card h2 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.card p {
  font-size: 0.8125rem;
  color: var(--gray-500);
  font-weight: 300;
  line-height: 1.5;
  max-width: 320px;
}

.card-arrow {
  position: absolute;
  top: 2.25rem;
  right: 2.5rem;
  font-size: 1.25rem;
  color: var(--gray-300);
  transition: color 0.3s var(--ease), transform 0.3s var(--ease);
}

.card:hover .card-arrow { color: var(--black); transform: translateX(4px); }

.cards-grid .card:last-child:nth-child(odd) { grid-column: 1 / -1; }

/* ══════════════════════════════════
   DETAIL VIEW
   ══════════════════════════════════ */

#detail-view { display: none; }
#detail-view.active { display: block; }
#home-view.hidden, .home-header.hidden { display: none; }

/* ── Hero ── */
.detail-hero {
  background: var(--brand-dark);
  color: var(--white);
  padding: 2.5rem 3rem 2.5rem;
  opacity: 0;
  animation: fadeIn 0.5s var(--ease) 0.05s forwards;
}

.detail-hero-inner {
  max-width: var(--max-w);
  margin: 0 auto;
}

.detail-hero-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.75rem;
}

.detail-hero-property {
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--gray-500);
  letter-spacing: 0.03em;
}

/* ── Sticky Mini-Header ── */
.detail-sticky-bar {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 3rem;
  transform: translateY(-100%);
  opacity: 0;
  transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
  pointer-events: none;
}

.detail-sticky-bar.visible {
  transform: translateY(0);
  opacity: 1;
  pointer-events: auto;
}

.detail-sticky-inner {
  max-width: var(--max-w);
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.75rem 0;
}

.sticky-back {
  font-family: var(--sans);
  font-size: 0.875rem;
  color: var(--gray-400);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: color 0.2s var(--ease);
  line-height: 1;
}

.sticky-back:hover { color: var(--black); }

.sticky-title {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 400;
  color: var(--black);
  letter-spacing: -0.005em;
}

/* ── Sidebar Document Title ── */
.sidebar-doc-title {
  font-family: var(--serif);
  font-size: 1rem;
  font-weight: 400;
  color: var(--black);
  letter-spacing: -0.005em;
  padding: 0 0 0.75rem;
  margin-bottom: 0.5rem;
  border-bottom: 1px solid var(--gray-200);
  line-height: 1.25;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--gray-400);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: color 0.25s var(--ease);
}

.back-btn:hover { color: var(--white); }

.detail-hero h2 {
  font-family: var(--serif);
  font-size: clamp(2rem, 3.5vw, 2.75rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.detail-hero .detail-subtitle {
  font-size: 0.875rem;
  color: var(--gray-400);
  font-weight: 300;
  margin-top: 0.75rem;
  max-width: 640px;
  line-height: 1.6;
}

/* ── TWO-COLUMN LAYOUT ── */
.detail-body {
  max-width: var(--max-w);
  margin: 0 auto;
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  gap: 0;
  padding: 0 3rem;
  position: relative;
}

/* Sidebar */
.detail-sidebar {
  position: sticky;
  top: 3rem;
  align-self: start;
  padding: 2.5rem 0;
  border-right: 1px solid var(--gray-200);
  height: fit-content;
  max-height: calc(100vh - 3rem);
  overflow-y: auto;
  scrollbar-width: none;
}

.detail-sidebar::-webkit-scrollbar { display: none; }

.sidebar-label {
  font-size: 0.5625rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  padding: 0 0 1rem;
}

.sidebar-link {
  display: block;
  font-family: var(--sans);
  font-size: 0.8125rem;
  font-weight: 300;
  color: var(--gray-400);
  text-decoration: none;
  padding: 0.5rem 1.5rem 0.5rem 0;
  transition: color 0.2s var(--ease), font-weight 0.2s var(--ease);
  cursor: pointer;
}

.sidebar-link:hover { color: var(--gray-600); }

.sidebar-link.active {
  color: var(--brand-blue);
  font-weight: 500;
}

/* Sidebar back button */
.sidebar-home {
  display: block;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 400;
  color: var(--gray-400);
  text-decoration: none;
  cursor: pointer;
  padding: 1.25rem 0 0;
  margin-top: 1.25rem;
  border-top: 1px solid var(--gray-200);
  transition: color 0.2s var(--ease);
  letter-spacing: 0.02em;
}

.sidebar-home:hover { color: var(--black); }

/* Content area */
.detail-content {
  padding: 2.5rem 0 5rem 3.5rem;
  min-width: 0;
}

/* ── SECTION ── */
.doc-section {
  padding-bottom: 3rem;
  margin-bottom: 3rem;
  border-bottom: 1px solid var(--gray-200);
}

.doc-section:last-child {
  border-bottom: none;
  margin-bottom: 0;
}

.section-label {
  font-family: var(--serif);
  font-size: 1.75rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  color: var(--black);
  margin-bottom: 1.75rem;
  line-height: 1.2;
}

/* ── CONTENT BLOCKS ── */
.block-group { margin-bottom: 2.5rem; }
.block-group:last-child { margin-bottom: 0; }

.block-heading {
  font-family: var(--serif);
  font-size: 1.375rem;
  font-weight: 400;
  letter-spacing: -0.01em;
  margin-bottom: 0.875rem;
  line-height: 1.25;
}

.block-text {
  font-size: 0.9375rem;
  line-height: 1.75;
  color: var(--gray-600);
  font-weight: 300;
  max-width: 680px;
  margin-bottom: 1.25rem;
}

/* ── PULL QUOTE ── */
.pull-quote {
  border-left: 2px solid var(--brand-blue);
  padding: 0.25rem 0 0.25rem 1.5rem;
  margin: 1.75rem 0;
  max-width: 580px;
}

.pull-quote-text {
  font-family: var(--serif);
  font-size: 1.25rem;
  line-height: 1.4;
  color: var(--black);
  font-weight: 400;
  letter-spacing: -0.01em;
}

.pull-quote-caption {
  font-size: 0.6875rem;
  font-weight: 400;
  color: var(--gray-500);
  margin-top: 0.5rem;
  letter-spacing: 0.02em;
}

/* ── NUMBERED ITEM ROWS ── */
.item-rows {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--gray-200);
}

.item-row {
  display: grid;
  grid-template-columns: 2.5rem 1fr;
  align-items: baseline;
  padding: 1rem 0;
  border-bottom: 1px solid var(--gray-200);
}

.item-num {
  font-size: 0.6875rem;
  font-weight: 600;
  color: var(--brand-blue);
  letter-spacing: 0.02em;
  padding-top: 0.1rem;
}

.item-text {
  font-size: 0.875rem;
  line-height: 1.65;
  color: var(--gray-600);
  font-weight: 300;
}

/* ── SUB-ITEMS ── */
.item-sub-rows {
  margin-top: 0.375rem;
  padding-left: 0.75rem;
  border-left: 1.5px solid var(--gray-200);
}

.item-sub-row {
  font-size: 0.8125rem;
  line-height: 1.6;
  color: var(--gray-500);
  font-weight: 300;
  padding: 0.25rem 0 0.25rem 0.75rem;
  position: relative;
}

.item-sub-row::before {
  content: '\25E6';
  position: absolute;
  left: -0.125rem;
  color: var(--gray-400);
  font-size: 0.625rem;
}

/* ── SECTION ICON BADGE ── */
.section-icon-badge {
  width: 2.5rem;
  height: 2.5rem;
  background: rgba(18,154,229,0.1);
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-right: 0.75rem;
  vertical-align: middle;
}

.section-icon-badge svg {
  width: 18px;
  height: 18px;
  color: var(--brand-blue);
}

/* ── SUB-HEADING ICON ── */
.block-heading-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 1.375rem;
  height: 1.375rem;
  background: var(--brand-blue);
  border-radius: 4px;
  margin-right: 0.5rem;
  vertical-align: middle;
}

.block-heading-icon svg {
  width: 11px;
  height: 11px;
  color: var(--white);
}

/* ── POLICY CARD GRID (3-col) ── */
.card-grid-3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--gray-200);
  border: 1px solid var(--gray-200);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 0.5rem;
}

.card-grid-3 .info-card {
  background: var(--white);
  padding: 1.5rem;
  position: relative;
}

.card-grid-3 .info-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: var(--brand-blue);
  opacity: 0;
  transition: opacity 0.25s var(--ease);
}

.card-grid-3 .info-card:hover::before { opacity: 1; }

.info-card-icon {
  width: 2rem;
  height: 2rem;
  background: rgba(18,154,229,0.1);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.75rem;
}

.info-card-icon svg {
  width: 14px;
  height: 14px;
  color: var(--brand-blue);
}

/* ── INFO CARDS ── */
.card-grid-2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--gray-200);
  border: 1px solid var(--gray-200);
  margin-top: 0.25rem;
}

.card-grid-2 .info-card {
  background: var(--white);
  padding: 1.5rem 1.75rem;
}

.card-grid-2 .info-card:last-child:nth-child(odd) { grid-column: 1 / -1; }

.info-card-label {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 0.5rem;
}

.info-card-text {
  font-size: 0.875rem;
  line-height: 1.6;
  color: var(--gray-600);
  font-weight: 300;
}

/* ── DATA TABLE ── */
.data-table-wrap {
  border: 1px solid var(--gray-200);
  overflow-x: auto;
  margin-top: 0.25rem;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8125rem;
}

.data-table th {
  font-weight: 500;
  text-align: left;
  padding: 0.875rem 1.25rem;
  border-bottom: 1px solid var(--gray-200);
  font-size: 0.625rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--gray-400);
  background: var(--gray-50);
}

.data-table td {
  padding: 0.875rem 1.25rem;
  border-bottom: 1px solid var(--gray-200);
  color: var(--gray-600);
  font-weight: 300;
}

.data-table tr:last-child td { border-bottom: none; }

/* ── TAKEAWAY BLOCK (enhanced) ── */
.takeaway-block {
  background: var(--brand-dark);
  color: var(--white);
  padding: 2.75rem 3rem;
}

.takeaway-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 2rem;
}

.takeaway-title {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 400;
  color: var(--white);
  letter-spacing: -0.01em;
}

.takeaway-label {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-500);
}

.takeaway-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--gray-800);
}

.takeaway-item {
  padding: 1.25rem 1.5rem 1.25rem 0;
  border-bottom: 1px solid var(--gray-800);
  display: grid;
  grid-template-columns: 2rem 1fr;
  align-items: baseline;
}

.takeaway-item:nth-child(odd) {
  border-right: 1px solid var(--gray-800);
  padding-right: 1.5rem;
}

.takeaway-item:nth-child(even) {
  padding-left: 1.5rem;
}

.takeaway-num {
  font-family: var(--serif);
  font-size: 1.125rem;
  color: var(--gray-500);
}

.takeaway-text {
  font-size: 0.875rem;
  line-height: 1.6;
  color: var(--gray-300);
  font-weight: 300;
}

/* ── ACTION STEPS ── */
.action-block {
  border: 1px solid var(--gray-200);
  padding: 2rem 2.25rem;
  margin-top: 0.5rem;
}

.action-block-label {
  font-size: 0.5625rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gray-400);
  margin-bottom: 0.375rem;
}

.action-block-title {
  font-family: var(--serif);
  font-size: 1.125rem;
  font-weight: 400;
  margin-bottom: 1.25rem;
  letter-spacing: -0.005em;
}

.action-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.action-step {
  display: grid;
  grid-template-columns: 2.5rem 1fr;
  align-items: baseline;
  padding: 0.75rem 0;
  border-top: 1px solid var(--gray-100);
}

.action-step:first-child { border-top: none; padding-top: 0; }

.action-step-num {

  <div class="cards-grid" id="cards-container"></div>
  <div class="quick-answers" id="quick-answers">
    <div class="quick-answers-label">Common Questions</div>
    <div class="quick-answers-grid" id="qa-grid"></div>
  </div>
</main>

<!-- ═══ DETAIL ═══ -->
<div id="detail-view">
  <div class="detail-hero">
    <div class="detail-hero-inner">
      <div class="detail-hero-top">
        <button class="back-btn" onclick="goHome()">&#8592;&ensp;All Documents</button>
        <span class="detail-hero-property" id="hero-property-name"></span>
      </div>
      <h2 id="detail-title"></h2>
      <p class="detail-subtitle" id="detail-subtitle"></p>
      <div class="detail-meta">
        <span class="detail-updated" id="detail-updated"></span>
        <button class="print-btn" onclick="window.print()">Print document</button>
      </div>
    </div>
  </div>
  <div class="detail-sticky-bar" id="detail-sticky-bar">
    <div class="detail-sticky-inner">
      <button class="sticky-back" onclick="goHome()">&#8592;</button>
      <span class="sticky-title" id="sticky-title"></span>
    </div>
  </div>
  <div class="detail-body">
    <aside class="detail-sidebar" id="detail-sidebar"></aside>
    <div class="detail-content" id="detail-content"></div>
  </div>
</div>


<script>
// ══════════════════════════════════
// CONFIG & LOADING
// ══════════════════════════════════

let abstracts = [];
let propertyName = '';

async function loadProperty() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('property');

  // No property parameter — show admin landing page
  if (!slug) {
    showAdminLanding();
    return;
  }

  // Hide admin if visible
  document.getElementById('admin-view').classList.remove('active');

  try {
    const res = await fetch(`data/${slug}.json`);
    if (!res.ok) throw new Error(`Property "${slug}" not found`);
    const data = await res.json();

    propertyName = data.property || slug;
    abstracts = data.abstracts || [];
    const quickAnswers = data.quickAnswers || [];

    // Set property name everywhere
    document.title = `${propertyName} – Community Abstracts`;
    document.getElementById('property-name').textContent = propertyName;
    document.getElementById('hero-property-name').textContent = propertyName;

    // Render quick answers
    const qaGrid = document.getElementById('qa-grid');
    qaGrid.innerHTML = '';
    quickAnswers.forEach(qa => {
      const chip = document.createElement('button');
      chip.className = 'qa-chip';
      chip.textContent = qa.question;
      chip.onclick = () => openDetail(qa.docId, qa.section);
      qaGrid.appendChild(chip);
    });

    // Render home cards
    const cardsContainer = document.getElementById('cards-container');
    cardsContainer.innerHTML = '';
    abstracts.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.onclick = () => openDetail(a.id);
      card.innerHTML = `
        <div>
          <div class="card-number">0${i + 1}</div>
          <h2>${a.title}</h2>
          <p>${a.desc}</p>
          ${a.updated ? `<div class="card-updated">Reviewed ${a.updated}</div>` : ''}
        </div>
        <span class="card-arrow">\u2192</span>
      `;
      cardsContainer.appendChild(card);
    });

    // Build search index
    buildSearchIndex();

    // Handle hash routing
    if (window.location.hash) handleHash();

  } catch (err) {
    document.getElementById('property-name').textContent = 'Error';
    document.getElementById('cards-container').innerHTML = `
      <div style="grid-column:1/-1;padding:3rem;text-align:center;color:#737373;font-size:0.875rem;">
        Could not load property data. Check that the <code>?property=</code> parameter matches a valid data file.<br>
        <span style="font-size:0.75rem;color:#A3A3A3;margin-top:0.5rem;display:block;">${err.message}</span>
      </div>`;
  }
}

// ══════════════════════════════════
// SEARCH
// ══════════════════════════════════

let searchIndex = [];

function buildSearchIndex() {
  searchIndex = [];
  abstracts.forEach(doc => {
    doc.sections.forEach(section => {
      section.blocks.forEach(block => {
        const texts = [];
        if (block.heading) texts.push(block.heading);
        if (block.text) texts.push(block.text);
        if (block.items) block.items.forEach(item => {
          if (typeof item === 'string') texts.push(item);
          else { texts.push(item.text); if (item.sub) texts.push(...item.sub); }
        });
        if (block.cards) block.cards.forEach(c => texts.push(c.label + ' ' + c.text));
        if (block.pullQuote) texts.push(block.pullQuote.text);
        if (block.action) { texts.push(block.action.title); block.action.steps.forEach(s => texts.push(s)); }
        if (block.takeaways) texts.push(...block.takeaways);
        if (block.table) block.table.rows.forEach(r => texts.push(r.join(' ')));
        texts.forEach(t => {
          searchIndex.push({ docId: doc.id, docTitle: doc.title, section: section.name, text: t });
        });
      });
    });
  });
}

function performSearch(query) {
  if (!query || query.length < 2) return [];
  const q = query.toLowerCase();
  const words = q.split(/\s+/).filter(w => w.length > 1);
  return searchIndex
    .filter(entry => words.every(w => entry.text.toLowerCase().includes(w)))
    .slice(0, 12)
    .map(entry => {
      let snippet = entry.text;
      if (snippet.length > 160) {
        const idx = snippet.toLowerCase().indexOf(words[0]);
        const start = Math.max(0, idx - 40);
        snippet = (start > 0 ? '\u2026' : '') + snippet.slice(start, start + 160) + '\u2026';
      }
      words.forEach(w => {
        const re = new RegExp(`(${w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        snippet = snippet.replace(re, '<mark>$1</mark>');
      });
      return { ...entry, snippet };
    });
}

function openSearch() {
  const overlay = document.getElementById('search-overlay');
  overlay.classList.add('active');
  const input = document.getElementById('search-input');
  input.value = '';
  document.getElementById('search-results').innerHTML = '';
  setTimeout(() => input.focus(), 50);
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('active');
}

document.getElementById('search-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeSearch();
});

document.getElementById('search-input').addEventListener('input', (e) => {
  const results = performSearch(e.target.value);
  const container = document.getElementById('search-results');
  if (e.target.value.length < 2) {
    container.innerHTML = '';
    return;
  }
  if (results.length === 0) {
    container.innerHTML = '<div class="search-empty">No results found</div>';
    return;
  }
  container.innerHTML = results.map(r => `
    <div class="search-result" onclick="closeSearch(); openDetail('${r.docId}', '${r.section}')">
      <div class="search-result-doc">${r.docTitle} \u203A ${r.section}</div>
      <div class="search-result-text">${r.snippet}</div>
    </div>
  `).join('');
});

document.addEventListener('keydown', (e) => {
  if (e.key === '/' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape') {
    const overlay = document.getElementById('search-overlay');
    if (overlay.classList.contains('active')) {
      closeSearch();
    } else if (document.getElementById('detail-view').classList.contains('active')) {
      goHome();
    }
  }
});

// ══════════════════════════════════
// DETAIL VIEW
// ══════════════════════════════════

function openDetail(id, scrollToSection) {
  const a = abstracts.find(x => x.id === id);
  if (!a) return;

  document.getElementById('home-view').classList.add('hidden');
  document.getElementById('home-header').classList.add('hidden');
  const detail = document.getElementById('detail-view');
  detail.classList.add('active');
  document.getElementById('detail-title').textContent = a.title;
  document.getElementById('detail-subtitle').textContent = a.subtitle;
  document.getElementById('detail-updated').textContent = a.updated ? `Last reviewed: ${a.updated}` : '';

  // Set sticky bar title
  document.getElementById('sticky-title').textContent = a.title;
  document.getElementById('detail-sticky-bar').classList.remove('visible');

  // Build sidebar with document title
  const sidebar = document.getElementById('detail-sidebar');
  sidebar.innerHTML = `<div class="sidebar-doc-title">${a.title}</div>` +
    `<div class="sidebar-label">Sections</div>` +
    a.sections.map((s, i) =>
      `<a class="sidebar-link${i === 0 ? ' active' : ''}" data-section="${i}" onclick="scrollToIdx(${i})">${s.name}</a>`
    ).join('') +
    `<a class="sidebar-home" onclick="goHome()">\u2190 All Documents</a>`;

  // Add "Original Document" to sidebar if fullText exists
  if (a.fullText) {
    const origIdx = a.sections.length;
    const sidebarEl = document.getElementById('detail-sidebar');
    const homeLink = sidebarEl.querySelector('.sidebar-home');
    const origLink = document.createElement('a');
    origLink.className = 'sidebar-link';
    origLink.dataset.section = String(origIdx);
    origLink.onclick = () => scrollToIdx(origIdx);
    origLink.textContent = 'Original Document';
    sidebarEl.insertBefore(origLink, homeLink);
  }

  // Build content
  const content = document.getElementById('detail-content');
  const otherDocs = abstracts.filter(x => x.id !== id);

  // Render original document section if fullText exists
  const originalDocHtml = a.fullText ? `
    <div class="doc-section" id="section-${a.sections.length}">
      <div class="original-doc" id="original-doc-panel">
        <button class="original-doc-toggle" onclick="document.getElementById('original-doc-panel').classList.toggle('open')">
          <span class="original-doc-toggle-icon">\u25B6</span>
          <div class="original-doc-toggle-text">
            <h3>Original Document</h3>
            <p>Full text from the governing documents as originally written</p>
          </div>
        </button>
        <div class="original-doc-body">
          ${a.fullText.map(block => {
            if (block.type === 'heading') return `<div class="original-doc-heading">${block.text}</div>`;
            return `<p>${block.text}</p>`;
          }).join('')}
        </div>
      </div>
    </div>` : '';

  content.innerHTML = a.sections.map((s, i) =>
    `<div class="doc-section" id="section-${i}">
      <div class="section-label">${s.name}</div>
      ${renderBlocks(s.blocks)}
      ${!s.isTakeaway ? '<div class="section-disclaimer">This is an abstract summary only. Please reference the official governing documents (Declaration, Bylaws, and Rules & Regulations) for complete and binding language.</div>' : ''}
    </div>`
  ).join('') + originalDocHtml + `
    <div class="doc-footer">
      <div class="doc-footer-label">Continue Reading</div>
      <div class="doc-footer-grid">
        ${otherDocs.map((d, j) => `
          <div class="doc-footer-item" onclick="openDetail('${d.id}')">
            <div>
              <div class="doc-footer-number">0${abstracts.indexOf(d) + 1}</div>
              <div class="doc-footer-name">${d.title}</div>
              <div class="doc-footer-desc">${d.desc}</div>
            </div>
            <span class="doc-footer-arrow">\u2192</span>
          </div>
        `).join('')}
      </div>
    </div>`;

  content.classList.add('view-transition');
  setTimeout(() => content.classList.remove('view-transition'), 500);

  window.scrollTo({ top: 0, behavior: 'instant' });
  window.location.hash = id;

  // Setup scroll spy and hero observer
  requestAnimationFrame(() => {
    setupScrollSpy();
    setupHeroObserver();
    if (scrollToSection) {
      const idx = a.sections.findIndex(s => s.name === scrollToSection);
      if (idx > -1) setTimeout(() => scrollToIdx(idx), 100);
    }
  });
}

function scrollToIdx(idx) {
  const el = document.getElementById(`section-${idx}`);
  if (el) {
    const stickyBar = document.getElementById('detail-sticky-bar');
    const offset = stickyBar && stickyBar.classList.contains('visible') ? 60 : 24;
    const y = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

function setupScrollSpy() {
  const sections = document.querySelectorAll('.doc-section');
  const links = document.querySelectorAll('.sidebar-link');
  if (!sections.length) return;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const idx = entry.target.id.replace('section-', '');
        links.forEach(l => l.classList.toggle('active', l.dataset.section === idx));
      }
    });
  }, { rootMargin: '-10% 0px -70% 0px', threshold: 0 });

  sections.forEach(s => observer.observe(s));
}

let heroObserver = null;

function setupHeroObserver() {
  if (heroObserver) heroObserver.disconnect();

  const hero = document.querySelector('.detail-hero');
  const stickyBar = document.getElementById('detail-sticky-bar');
  if (!hero || !stickyBar) return;

  heroObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        stickyBar.classList.remove('visible');
      } else {
        stickyBar.classList.add('visible');
      }
    });
  }, { threshold: 0, rootMargin: '0px' });

  heroObserver.observe(hero);
}

function goHome() {
  document.getElementById('detail-view').classList.remove('active');
  document.getElementById('home-view').classList.remove('hidden');
  document.getElementById('home-header').classList.remove('hidden');
  document.getElementById('detail-sticky-bar').classList.remove('visible');
  if (heroObserver) heroObserver.disconnect();
  window.scrollTo({ top: 0, behavior: 'instant' });
  history.replaceState(null, '', window.location.pathname + window.location.search);
}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════

function renderBlocks(blocks) {
  return blocks.map((b, i) => {
    if (b.takeaways) {
      return `<div class="takeaway-block">
        <div class="takeaway-header">
          <div class="takeaway-title">What to Remember</div>
          <div class="takeaway-label">Key Takeaways</div>
        </div>
        <div class="takeaway-grid">
          ${b.takeaways.map((t, j) => `
            <div class="takeaway-item">
              <span class="takeaway-num">${j + 1}</span>
              <span class="takeaway-text">${t}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    }

    let html = '<div class="block-group">';

    // Heading with optional icon badge
    if (b.heading) {
      const iconHtml = b.icon ? `<span class="block-heading-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${b.icon}</svg></span>` : '';
      html += `<h3 class="block-heading">${iconHtml}${b.heading}</h3>`;
    }
    if (b.text) html += `<p class="block-text">${b.text}</p>`;

    if (b.pullQuote) {
      html += `<div class="pull-quote">
        <div class="pull-quote-text">${b.pullQuote.text}</div>
        ${b.pullQuote.caption ? `<div class="pull-quote-caption">${b.pullQuote.caption}</div>` : ''}
      </div>`;
    }

    if (b.action) {
      html += `<div class="action-block">
        <div class="action-block-label">${b.action.label || 'Common Action'}</div>
        <div class="action-block-title">${b.action.title}</div>
        <div class="action-steps">
          ${b.action.steps.map((s, j) => `
            <div class="action-step">
              <span class="action-step-num">${j + 1}</span>
              <span class="action-step-text">${s}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
    }

    if (b.items) {
      html += `<div class="item-rows">
        ${b.items.map((item, j) => {
          if (typeof item === 'string') {
            return `<div class="item-row">
              <span class="item-num">${String(j + 1).padStart(2, '0')}</span>
              <span class="item-text">${item}</span>
            </div>`;
          }
          // Object with text and sub-items
          let subHtml = '';
          if (item.sub) {
            subHtml = `<div class="item-sub-rows">
              ${item.sub.map(s => `<div class="item-sub-row">${s}</div>`).join('')}
            </div>`;
          }
          return `<div class="item-row">
            <span class="item-num">${String(j + 1).padStart(2, '0')}</span>
            <span class="item-text">${item.text}${subHtml}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    if (b.cards) {
      const gridClass = b.cardColumns === 3 ? 'card-grid-3' : 'card-grid-2';
      html += `<div class="${gridClass}">
        ${b.cards.map(c => `
          <div class="info-card">
            ${c.icon ? `<div class="info-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${c.icon}</svg></div>` : ''}
            <div class="info-card-label">${c.label}</div>
            <div class="info-card-text">${c.text}</div>
          </div>
        `).join('')}
      </div>`;
    }

    if (b.table) {
      html += `<div class="data-table-wrap">
        <table class="data-table">
          <thead><tr>${b.table.headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${b.table.rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
      </div>`;
    }

    if (b.sourceText) {
      const uid = 'src_' + Math.random().toString(36).substr(2, 6);
      html += `<div class="source-expander" id="${uid}">
        <button class="source-toggle" onclick="document.getElementById('${uid}').classList.toggle('open')">
          <span class="source-toggle-icon">\u25B6</span> ${b.sourceText.label || 'View source language'}
        </button>
        <div class="source-body">
          <div class="source-label">${b.sourceText.heading || 'From the governing documents'}</div>
          ${b.sourceText.passages.map(p =>
            `<div class="source-text">${p}</div>`
          ).join('')}
          ${b.sourceText.ref ? `<div class="source-ref">${b.sourceText.ref}</div>` : ''}
        </div>
      </div>`;
    }

    html += '</div>';
    if (i < blocks.length - 1 && !blocks[i + 1].takeaways) {
      html += '<hr class="block-sep">';
    }
    return html;
  }).join('');
}

// ══════════════════════════════════
// ADMIN LANDING
// ══════════════════════════════════

const properties = [
  { slug: "lakewest", name: "Lakewest Condominiums", docs: 6 },
  { slug: "fransson-farms", name: "Fransson Farms", docs: 6 },
  { slug: "stone-horse", name: "Stone Horse Condominiums", docs: 7 },
  { slug: "summerlin-ridge", name: "Summerlin Ridge Condominiums", docs: 6 },
  { slug: "shannon-heights", name: "Shannon Heights", docs: 6 },
  { slug: "chateau-ville", name: "Château Ville Condominiums", docs: 6 }
];

function showAdminLanding() {
  // Hide the property app views
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('home-header').style.display = 'none';
  document.getElementById('detail-view').style.display = 'none';

  // Show admin
  const admin = document.getElementById('admin-view');
  admin.classList.add('active');
  document.title = 'HOA Abstracts \u2014 Admin';

  const grid = document.getElementById('admin-grid');
  grid.innerHTML = '';

  const baseUrl = window.location.origin + window.location.pathname;

  properties.forEach(p => {
    const card = document.createElement('div');
    card.className = 'admin-card';
    card.onclick = () => { window.location.href = `${baseUrl}?property=${p.slug}`; };
    card.innerHTML = `
      <div>
        <div class="admin-card-name">${p.name}</div>
        <div class="admin-card-slug">?property=${p.slug}</div>
        <div class="admin-card-meta">${p.docs} documents</div>
        <a class="admin-card-link" href="${baseUrl}?property=${p.slug}" onclick="event.stopPropagation()">Copy link</a>
      </div>
      <span class="admin-card-arrow">\u2192</span>
    `;
    grid.appendChild(card);
  });
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════

function handleHash() {
  const hash = window.location.hash.replace('#', '');
  if (hash && abstracts.find(a => a.id === hash)) openDetail(hash);
}

window.addEventListener('hashchange', handleHash);

// Load property data on page load
loadProperty();
</script>
</body>
</html>
